// ---------- LOOKUP FUNCTIONS ----------
function lookupPurdueLevel(value) {
  var lvl = String(value).trim();
  if (PURDUE[lvl]) return { found: true, type: "purdue", data: PURDUE[lvl] };
  return { found: false, error: "No Purdue level '" + lvl + "'. Valid: 0, 1, 2, 3, 3.5, 4, 5." };
}

function lookupIec(value) {
  var key = String(value).trim().toUpperCase().replace(/\s+/g, " ");
  for (var k in IEC) {
    if (k.toUpperCase() === key) return { found: true, type: "iec", id: k, data: IEC[k] };
  }
  for (var k2 in IEC) {
    if (k2.toUpperCase().indexOf(key) !== -1 || key.indexOf(k2.toUpperCase()) !== -1) {
      return { found: true, type: "iec", id: k2, data: IEC[k2] };
    }
  }
  return { found: false, error: "No IEC 62443 entry for '" + value + "'. Try FR 1-7 or SR X.Y." };
}

function lookupNist(value) {
  var key = String(value).trim().toUpperCase();
  if (NIST[key]) return { found: true, type: "nist", id: key, data: NIST[key] };
  for (var k in NIST) {
    if (k.indexOf(key) !== -1 || key.indexOf(k) !== -1) {
      return { found: true, type: "nist", id: k, data: NIST[k] };
    }
  }
  return { found: false, error: "No NIST 800-82 entry for '" + value + "'. Try control IDs like AC-3, SC-7, IA-2." };
}

function classifyAsset(value) {
  var v = String(value).toLowerCase().trim();
  var matches = [];
  for (var i = 0; i < ASSETS.length; i++) {
    for (var j = 0; j < ASSETS[i].keywords.length; j++) {
      if (v.indexOf(ASSETS[i].keywords[j]) !== -1) {
        matches.push({ keyword: ASSETS[i].keywords[j], level: ASSETS[i].level });
        break;
      }
    }
  }
  if (matches.length === 0) {
    return { found: false, error: "Could not classify '" + value + "'. Try a more specific asset type." };
  }
  matches.sort(function(a, b) { return b.keyword.length - a.keyword.length; });
  var winner = matches[0];
  return {
    found: true,
    type: "asset",
    asset: value,
    matched_keyword: winner.keyword,
    level: winner.level,
    purdue: PURDUE[winner.level],
    other_matches: matches.slice(1, 4)
  };
}

function crossReference(value) {
  var v = String(value).trim().toUpperCase();
  for (var k in IEC) {
    if (k.toUpperCase() === v) {
      var entry = IEC[k];
      var levels = entry.purdue_levels || [];
      return {
        found: true,
        type: "xref",
        id: k,
        source: "IEC 62443",
        entry: entry,
        purdue_levels: levels.map(function(l) {
          return { level: l, name: (PURDUE[l] && PURDUE[l].name) ? PURDUE[l].name : l };
        })
      };
    }
  }
  if (NIST[v]) {
    var nentry = NIST[v];
    var nlevels = nentry.purdue_levels || [];
    return {
      found: true,
      type: "xref",
      id: v,
      source: "NIST 800-82",
      entry: nentry,
      purdue_levels: nlevels.map(function(l) {
        return { level: l, name: (PURDUE[l] && PURDUE[l].name) ? PURDUE[l].name : l };
      })
    };
  }
  return { found: false, error: "No cross-reference for '" + value + "'. Try a control ID like SR 2.1, FR 5, or AC-3." };
}

function listAll(value) {
  var v = String(value).toLowerCase().trim();
  if (v === "purdue" || v === "") {
    var pitems = [];
    for (var k in PURDUE) pitems.push({ id: k, name: PURDUE[k].name });
    return { found: true, type: "list", category: "Purdue Levels", items: pitems };
  }
  if (v === "iec") {
    var iitems = [];
    for (var k2 in IEC) iitems.push({ id: k2, name: IEC[k2].name });
    return { found: true, type: "list", category: "IEC 62443", items: iitems };
  }
  if (v === "nist") {
    var nitems = [];
    for (var k3 in NIST) nitems.push({ id: k3, name: NIST[k3].name });
    return { found: true, type: "list", category: "NIST 800-82", items: nitems };
  }
  return { found: false, error: "Unknown list category. Try: purdue, iec, nist." };
}

// ---------- HTML RENDERING ----------
var STYLE = '<style>' +
  '.otref{font-family:-apple-system,system-ui,"SF Pro Display",sans-serif;background:linear-gradient(180deg,#0f0f10 0%,#1a1a1c 100%);color:#f5f5f7;padding:20px;border-radius:16px;border:1px solid #2a2a2e;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.4);}' +
  '.otref h2{color:#d4a843;margin:0 0 4px 0;font-size:20px;font-weight:600;letter-spacing:-0.3px;}' +
  '.otref h3{color:#8b8b90;margin:18px 0 8px 0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}' +
  '.otref .aka{color:#6e6e73;font-size:13px;margin-bottom:14px;}' +
  '.otref .desc{font-size:14px;line-height:1.55;color:#d1d1d6;margin-bottom:8px;}' +
  '.otref ul{margin:6px 0 0 0;padding:0;list-style:none;}' +
  '.otref li{font-size:13px;line-height:1.6;color:#d1d1d6;padding:4px 0;border-bottom:1px solid #1f1f22;}' +
  '.otref li:last-child{border-bottom:none;}' +
  '.otref .meta{background:rgba(212,168,67,0.08);border-left:2px solid #d4a843;padding:10px 14px;margin:14px 0;border-radius:0 8px 8px 0;font-size:13px;color:#d1d1d6;}' +
  '.otref .meta strong{color:#d4a843;font-weight:600;}' +
  '.otref .notes{background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.2);padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.5;color:#e8e8ed;margin-top:14px;}' +
  '.otref .notes-label{display:block;color:#d4a843;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px;}' +
  '.otref .tag{display:inline-block;background:#d4a843;color:#0f0f10;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;margin:3px 4px 3px 0;letter-spacing:0.3px;}' +
  '.otref .tag-out{display:inline-block;background:transparent;border:1px solid #3a3a3e;color:#d1d1d6;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;margin:3px 4px 3px 0;}' +
  '.otref .err{color:#ff6b6b;padding:14px;font-size:14px;}' +
  '</style>';

function tagList(arr) {
  return arr.map(function(x) { return '<span class="tag-out">' + x + '</span>'; }).join('');
}

function renderPurdue(r) {
  var d = r.data;
  return STYLE + '<div class="otref">' +
    '<h2>' + d.name + '</h2>' +
    '<div class="aka">' + d.aka + '</div>' +
    '<div class="desc">' + d.description + '</div>' +
    '<h3>Typical Assets</h3>' +
    '<ul>' + d.assets.map(function(a) { return '<li>' + a + '</li>'; }).join('') + '</ul>' +
    '<h3>Common Protocols</h3>' +
    '<div>' + tagList(d.protocols) + '</div>' +
    '<h3>Typical Threats</h3>' +
    '<ul>' + d.threats.map(function(t) { return '<li>' + t + '</li>'; }).join('') + '</ul>' +
    '<div class="meta"><strong>IEC 62443 Zone</strong><br>' + d.iec_zone + '</div>' +
    '<div class="notes"><span class="notes-label">Field Note</span>' + d.notes + '</div>' +
    '</div>';
}

function renderIec(r) {
  var d = r.data;
  if (d.srs) {
    return STYLE + '<div class="otref">' +
      '<h2>' + d.name + '</h2>' +
      '<div class="desc">' + d.purpose + '</div>' +
      '<h3>Applies to Purdue Levels</h3>' +
      '<div>' + d.purdue_levels.map(function(l) { return '<span class="tag">L' + l + '</span>'; }).join('') + '</div>' +
      '<h3>Related NIST 800-82</h3>' +
      '<div>' + tagList(d.related_nist) + '</div>' +
      '<h3>System Requirements</h3>' +
      '<div>' + tagList(d.srs) + '</div>' +
      '</div>';
  }
  return STYLE + '<div class="otref">' +
    '<h2>' + d.name + '</h2>' +
    '<div class="meta"><strong>Parent</strong><br>' + d.fr + '</div>' +
    '<div class="desc">' + d.purpose + '</div>' +
    '<h3>Applies to Purdue Levels</h3>' +
    '<div>' + d.purdue_levels.map(function(l) { return '<span class="tag">L' + l + '</span>'; }).join('') + '</div>' +
    (d.notes ? '<div class="notes"><span class="notes-label">Field Note</span>' + d.notes + '</div>' : '') +
    '</div>';
}

function renderNist(r) {
  var d = r.data;
  return STYLE + '<div class="otref">' +
    '<h2>' + d.name + '</h2>' +
    '<div class="aka">' + d.family + '</div>' +
    '<div class="desc">' + d.purpose + '</div>' +
    '<h3>OT Overlay (SP 800-82r3)</h3>' +
    '<div class="desc">' + d.ot_overlay + '</div>' +
    '<h3>Applies to Purdue Levels</h3>' +
    '<div>' + d.purdue_levels.map(function(l) { return '<span class="tag">L' + l + '</span>'; }).join('') + '</div>' +
    '<h3>Related IEC 62443</h3>' +
    '<div>' + tagList(d.related_iec) + '</div>' +
    '</div>';
}

function renderAsset(r) {
  var p = r.purdue;
  return STYLE + '<div class="otref">' +
    '<h2>' + r.asset + '</h2>' +
    '<div class="aka">Matched on: ' + r.matched_keyword + '</div>' +
    '<h3>Purdue Level</h3>' +
    '<div><span class="tag">L' + r.level + '</span>&nbsp;' + p.name + '</div>' +
    '<div class="desc" style="margin-top:10px">' + p.description + '</div>' +
    '<div class="meta"><strong>IEC 62443 Zone</strong><br>' + p.iec_zone + '</div>' +
    '<h3>Typical Threats</h3>' +
    '<ul>' + p.threats.map(function(t) { return '<li>' + t + '</li>'; }).join('') + '</ul>' +
    '<div class="notes"><span class="notes-label">Field Note</span>' + p.notes + '</div>' +
    (r.other_matches.length > 0 ? '<h3>Other Possible Classifications</h3><div>' + r.other_matches.map(function(m) { return '<span class="tag-out">L' + m.level + ' (' + m.keyword + ')</span>'; }).join('') + '</div>' : '') +
    '</div>';
}

function renderXref(r) {
  return STYLE + '<div class="otref">' +
    '<h2>' + r.id + '</h2>' +
    '<div class="aka">' + r.source + '</div>' +
    '<div class="desc">' + (r.entry.purpose || r.entry.name) + '</div>' +
    '<h3>Applies to Purdue Levels</h3>' +
    '<ul>' + r.purdue_levels.map(function(l) { return '<li><span class="tag">L' + l.level + '</span>&nbsp;' + l.name + '</li>'; }).join('') + '</ul>' +
    '</div>';
}

function renderList(r) {
  return STYLE + '<div class="otref">' +
    '<h2>' + r.category + '</h2>' +
    '<ul>' + r.items.map(function(i) { return '<li><strong style="color:#d4a843">' + i.id + '</strong>&nbsp;&nbsp;' + i.name + '</li>'; }).join('') + '</ul>' +
    '</div>';
}

function renderError(msg) {
  return STYLE + '<div class="otref"><div class="err">' + msg + '</div></div>';
}

// ---------- ENTRY POINT ----------
async function ai_edge_gallery_get_result(data) {
  try {
    var params;
    if (typeof data === 'string') {
      params = JSON.parse(data);
    } else if (typeof data === 'object' && data !== null) {
      params = data;
    } else {
      return JSON.stringify({ error: 'Invalid data type: ' + typeof data });
    }

    var qt = params.query_type;
    var v = params.value;
    var r;

    if (qt === 'purdue_level') r = lookupPurdueLevel(v);
    else if (qt === 'iec_lookup') r = lookupIec(v);
    else if (qt === 'nist_lookup') r = lookupNist(v);
    else if (qt === 'asset_classify') r = classifyAsset(v);
    else if (qt === 'cross_reference') r = crossReference(v);
    else if (qt === 'list_all') r = listAll(v);
    else return JSON.stringify({ error: 'Unknown query_type: ' + qt });

    if (!r.found) return JSON.stringify({ error: r.error });

    var html;
    if (r.type === 'purdue') html = renderPurdue(r);
    else if (r.type === 'iec') html = renderIec(r);
    else if (r.type === 'nist') html = renderNist(r);
    else if (r.type === 'asset') html = renderAsset(r);
    else if (r.type === 'xref') html = renderXref(r);
    else if (r.type === 'list') html = renderList(r);
    else html = renderError('Internal: unknown result type');

    return JSON.stringify({ result: html });
  } catch (e) {
    return JSON.stringify({ error: 'Skill error: ' + (e.message || String(e)) });
  }
}

window.ai_edge_gallery_get_result = ai_edge_gallery_get_result;
window.run_js = ai_edge_gallery_get_result;
</script>
