// ––––– LOOKUP LOGIC –––––
function lookupPurdueLevel(value) {
const lvl = String(value).trim();
if (PURDUE[lvl]) return { found: true, type: “purdue”, level: lvl, data: PURDUE[lvl] };
return { found: false, error: `No Purdue level "${lvl}". Valid: 0, 1, 2, 3, 3.5, 4, 5.` };
}

function lookupIec(value) {
const key = String(value).trim().toUpperCase().replace(/\s+/g, “ “);
// try exact match
for (const k of Object.keys(IEC)) {
if (k.toUpperCase() === key) return { found: true, type: “iec”, id: k, data: IEC[k] };
}
// try partial
for (const k of Object.keys(IEC)) {
if (k.toUpperCase().includes(key) || key.includes(k.toUpperCase())) {
return { found: true, type: “iec”, id: k, data: IEC[k] };
}
}
return { found: false, error: `No IEC 62443 entry for "${value}". Try FR 1–7 or SR X.Y format.` };
}

function lookupNist(value) {
const key = String(value).trim().toUpperCase();
if (NIST[key]) return { found: true, type: “nist”, id: key, data: NIST[key] };
// partial
for (const k of Object.keys(NIST)) {
if (k.includes(key) || key.includes(k)) {
return { found: true, type: “nist”, id: k, data: NIST[k] };
}
}
return { found: false, error: `No NIST 800-82 entry for "${value}". Try control IDs like AC-3, SC-7, IA-2.` };
}

function classifyAsset(value) {
const v = String(value).toLowerCase().trim();
const matches = [];
for (const a of ASSETS) {
for (const kw of a.keywords) {
if (v.includes(kw)) {
matches.push({ keyword: kw, level: a.level });
break;
}
}
}
if (matches.length === 0) {
return { found: false, error: `Could not classify "${value}". Try a more specific asset type (e.g., "Allen-Bradley ControlLogix", "PI Historian", "Siemens HMI").` };
}
// Highest specificity wins (longest matched keyword)
matches.sort((a, b) => b.keyword.length - a.keyword.length);
const winner = matches[0];
return {
found: true,
type: “asset”,
asset: value,
matched_keyword: winner.keyword,
level: winner.level,
purdue: PURDUE[winner.level],
other_matches: matches.slice(1, 4)
};
}

function crossReference(value) {
const v = String(value).trim().toUpperCase();
// Try IEC
for (const k of Object.keys(IEC)) {
if (k.toUpperCase() === v) {
const entry = IEC[k];
const levels = entry.purdue_levels || [];
return {
found: true,
type: “xref”,
id: k,
source: “IEC 62443”,
entry: entry,
purdue_levels: levels.map(l => ({ level: l, name: PURDUE[l]?.name || l }))
};
}
}
// Try NIST
if (NIST[v]) {
const entry = NIST[v];
return {
found: true,
type: “xref”,
id: v,
source: “NIST 800-82”,
entry: entry,
purdue_levels: (entry.purdue_levels || []).map(l => ({ level: l, name: PURDUE[l]?.name || l }))
};
}
return { found: false, error: `No cross-reference for "${value}". Try a control ID like SR 2.1, FR 5, or AC-3.` };
}

function listAll(value) {
const v = String(value).toLowerCase().trim();
if (v === “purdue” || v === “”) {
return { found: true, type: “list”, category: “purdue”, items: Object.keys(PURDUE).map(k => ({ id: k, name: PURDUE[k].name })) };
}
if (v === “iec”) {
return { found: true, type: “list”, category: “iec”, items: Object.keys(IEC).map(k => ({ id: k, name: IEC[k].name })) };
}
if (v === “nist”) {
return { found: true, type: “list”, category: “nist”, items: Object.keys(NIST).map(k => ({ id: k, name: NIST[k].name })) };
}
return { found: false, error: `Unknown list category "${value}". Try: purdue, iec, nist.` };
}

// ––––– HTML RENDERING –––––
const STYLE = `

<style>
.otref { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #e8e8e8; padding: 16px; border-radius: 12px; border: 1px solid #d4a843; max-width: 100%; }
.otref h2 { color: #d4a843; margin: 0 0 8px 0; font-size: 18px; border-bottom: 1px solid #d4a843; padding-bottom: 6px; }
.otref h3 { color: #d4a843; margin: 14px 0 6px 0; font-size: 14px; }
.otref .aka { color: #999; font-size: 12px; font-style: italic; margin-bottom: 8px; }
.otref .desc { font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
.otref ul { margin: 4px 0 10px 18px; padding: 0; font-size: 13px; line-height: 1.5; }
.otref li { margin-bottom: 3px; }
.otref .meta { background: #1a1a1a; border-left: 3px solid #d4a843; padding: 8px 12px; margin: 8px 0; font-size: 12px; }
.otref .meta strong { color: #d4a843; }
.otref .notes { background: #2a1f0a; border: 1px solid #d4a843; padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-top: 10px; }
.otref .notes::before { content: "⚠ FIELD NOTE: "; color: #d4a843; font-weight: bold; }
.otref .tag { display: inline-block; background: #d4a843; color: #0a0a0a; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin: 2px; }
.otref .tag-out { display: inline-block; background: transparent; border: 1px solid #d4a843; color: #d4a843; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
.otref .err { color: #ff6b6b; padding: 12px; }
</style>

`;

function renderPurdue(r) {
const d = r.data;
return STYLE + `<div class="otref"> <h2>${d.name}</h2> <div class="aka">${d.aka}</div> <div class="desc">${d.description}</div> <h3>Typical Assets</h3> <ul>${d.assets.map(a => `<li>${a}</li>`).join("")}</ul> <h3>Common Protocols</h3> <div>${d.protocols.map(p => `<span class="tag-out">${p}</span>`).join("")}</div> <h3>Typical Threats</h3> <ul>${d.typical_threats.map(t => `<li>${t}</li>`).join(””)}</ul>
<div class="meta"><strong>IEC 62443 Zone:</strong> ${d.iec_zone}</div>
<div class="notes">${d.notes}</div>

  </div>`;
}

function renderIec(r) {
const d = r.data;
if (d.srs) {
// It’s an FR
return STYLE + `<div class="otref"> <h2>${d.name}</h2> <div class="desc">${d.purpose}</div> <h3>Applies to Purdue Levels</h3> <div>${d.purdue_levels.map(l => `<span class="tag">L${l}</span>`).join("")}</div> <h3>Related NIST 800-82 Controls</h3> <div>${d.related_nist.map(n => `<span class="tag-out">${n}</span>`).join("")}</div> <h3>System Requirements (SRs)</h3> <div>${d.srs.map(s => `<span class="tag-out">${s}</span>`).join("")}</div> </div>`;
} else {
// It’s an SR
return STYLE + `<div class="otref"> <h2>${d.name}</h2> <div class="meta"><strong>Parent FR:</strong> ${d.fr}</div> <div class="desc">${d.purpose}</div> <h3>Applies to Purdue Levels</h3> <div>${d.purdue_levels.map(l => `<span class="tag">L${l}</span>`).join("")}</div> ${d.notes ? `<div class="notes">${d.notes}</div>` : ""} </div>`;
}
}

function renderNist(r) {
const d = r.data;
return STYLE + `<div class="otref"> <h2>${d.name}</h2> <div class="meta"><strong>Family:</strong> ${d.family}</div> <div class="desc">${d.purpose}</div> <h3>OT Overlay (per SP 800-82r3)</h3> <div class="desc">${d.ot_overlay}</div> <h3>Applies to Purdue Levels</h3> <div>${d.purdue_levels.map(l => `<span class="tag">L${l}</span>`).join("")}</div> <h3>Related IEC 62443</h3> <div>${d.related_iec.map(i => `<span class="tag-out">${i}</span>`).join(””)}</div>

  </div>`;
}

function renderAsset(r) {
const p = r.purdue;
return STYLE + `<div class="otref"> <h2>Asset Classification: ${r.asset}</h2> <div class="meta"><strong>Matched on:</strong> "${r.matched_keyword}"</div> <h3>Purdue Level</h3> <div><span class="tag">L${r.level}</span> ${p.name}</div> <div class="aka">${p.aka}</div> <div class="desc" style="margin-top:8px">${p.description}</div> <div class="meta"><strong>IEC 62443 Zone:</strong> ${p.iec_zone}</div> <h3>Typical Threats at this Layer</h3> <ul>${p.typical_threats.map(t => `<li>${t}</li>`).join("")}</ul> <div class="notes">${p.notes}</div> ${r.other_matches.length > 0 ? `<h3>Other possible classifications</h3><div>${r.other_matches.map(m => `<span class="tag-out">L${m.level} (${m.keyword})</span>`).join(””)}</div>` : “”}

  </div>`;
}

function renderXref(r) {
return STYLE + `<div class="otref"> <h2>Cross-Reference: ${r.id}</h2> <div class="meta"><strong>Source:</strong> ${r.source}</div> <div class="desc">${r.entry.purpose || r.entry.name}</div> <h3>Applies to Purdue Levels</h3> <ul>${r.purdue_levels.map(l => `<li><span class="tag">L${l.level}</span> ${l.name}</li>`).join(””)}</ul>

  </div>`;
}

function renderList(r) {
return STYLE + `<div class="otref"> <h2>${r.category.toUpperCase()} — All Entries</h2> <ul>${r.items.map(i => `<li><strong style="color:#d4a843">${i.id}</strong> — ${i.name}</li>`).join(””)}</ul>

  </div>`;
}

function renderError(msg) {
return STYLE + `<div class="otref"><div class="err">⚠ ${msg}</div></div>`;
}

// ––––– ENTRY POINT –––––
async function ai_edge_gallery_get_result(data) {
try {
const params = JSON.parse(data);
const qt = params.query_type;
const v = params.value;
let r;
switch (qt) {
case “purdue_level”: r = lookupPurdueLevel(v); break;
case “iec_lookup”:   r = lookupIec(v); break;
case “nist_lookup”:  r = lookupNist(v); break;
case “asset_classify”: r = classifyAsset(v); break;
case “cross_reference”: r = crossReference(v); break;
case “list_all”:     r = listAll(v); break;
default: return JSON.stringify({ error: `Unknown query_type: ${qt}` });
}
if (!r.found) return JSON.stringify({ error: r.error });
let html;
switch (r.type) {
case “purdue”: html = renderPurdue(r); break;
case “iec”:    html = renderIec(r); break;
case “nist”:   html = renderNist(r); break;
case “asset”:  html = renderAsset(r); break;
case “xref”:   html = renderXref(r); break;
case “list”:   html = renderList(r); break;
default: html = renderError(“Internal: unknown result type”);
}
return JSON.stringify({ result: html });
} catch (e) {
return JSON.stringify({ error: `Skill error: ${e.message}` });
}
}

window.ai_edge_gallery_get_result = ai_edge_gallery_get_result;
</script>
